name: CI Docker

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'src/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'build.rs'
      - 'config/**'
      - '.github/workflows/ci-docker.yml'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'src/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'build.rs'
      - 'config/**'
      - '.github/workflows/ci-docker.yml'
  workflow_dispatch:

jobs:
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: tgt:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

