name: CI macOS

on:
  push:
    branches-ignore: ["dependabot/**"]
    tags-ignore: ["**"]
    paths:
      - "src/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "rustfmt.toml"
      - "config/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["**"]
    paths:
      - "src/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "rustfmt.toml"
      - "config/**"
      - ".github/workflows/**"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TDLIB_VERSION: 6d509061574d684117f74133056aa43df89022fc
  API_HASH: a3406de8d171bb422bb6ddf3bbd800e2
  API_ID: 94575

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        # os: [macos-13, macos-14]
        os: [macos-15-intel, macos-14]
        feature: [local-tdlib, download-tdlib, pkg-config, "local-tdlib,static", "download-tdlib,static"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # This is only needed if we build against the chafa-dyn feature
      # Chafa is an image library that is used to display images in the terminal without the need of an image protocol. It provides better image then rendering halblocks. 
      # TGT is now built without chafa by default, but the workflows are configured to be built with chafa-dyn as well for later use, with the prebuilt releases. 
      - name: Install chafa (for ratatui-image)
        run: brew install chafa

      - name: Restore cache TDLib
        if: contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config') || contains(matrix.feature, 'download-tdlib')
        id: cache-tdlib-restore
        uses: actions/cache/restore@v5
        with:
          path: td/
          key: ${{ runner.os }}-${{ runner.arch }}-TDLib-${{ env.TDLIB_VERSION }}
      - name: Build TDLib
        if: steps.cache-tdlib-restore.outputs.cache-hit != 'true' && (contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config') || contains(matrix.feature, 'download-tdlib'))
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          brew install gperf openssl zlib
          git clone https://github.com/tdlib/td.git
          cd td
          git checkout $TDLIB_VERSION
          rm -rf build
          mkdir build
          cd build
          if [ "$(uname -m)" = "arm64" ]; then
            OPENSSL_PREFIX="$(brew --prefix openssl 2>/dev/null || echo "/opt/homebrew/opt/openssl")"
            ZLIB_PREFIX="$(brew --prefix zlib 2>/dev/null || echo "/opt/homebrew/opt/zlib")"
          else
            OPENSSL_PREFIX="$(brew --prefix openssl 2>/dev/null || echo "/usr/local/opt/openssl")"
            ZLIB_PREFIX="$(brew --prefix zlib 2>/dev/null || echo "/usr/local/opt/zlib")"
          fi
          cmake \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR="$OPENSSL_PREFIX" \
            -DZLIB_ROOT="$ZLIB_PREFIX" \
            -DCMAKE_INSTALL_PREFIX:PATH=../tdlib \
            ..
          cmake --build . --target install

      - name: Copy static TDLib archives for local-tdlib,static
        if: matrix.feature == 'local-tdlib,static'
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            OPENSSL_PREFIX="$(brew --prefix openssl 2>/dev/null || echo "/opt/homebrew/opt/openssl")"
          else
            OPENSSL_PREFIX="$(brew --prefix openssl 2>/dev/null || echo "/usr/local/opt/openssl")"
          fi
          OPENSSL_SSL="$(find "$OPENSSL_PREFIX" -type f -name libssl.a 2>/dev/null | head -n 1)"
          OPENSSL_CRYPTO="$(find "$OPENSSL_PREFIX" -type f -name libcrypto.a 2>/dev/null | head -n 1)"
          ZLIB_LIB="$(find "$(brew --prefix zlib 2>/dev/null || brew --prefix)" -type f -name libz.a 2>/dev/null | head -n 1)"
          if [ -z "$OPENSSL_SSL" ] || [ -z "$OPENSSL_CRYPTO" ]; then
            echo "OpenSSL static libs not found in $OPENSSL_PREFIX"
            find "$(brew --prefix)" -type f \( -name 'libssl.a' -o -name 'libcrypto.a' \) | head -n 20
            exit 1
          fi
          if [ -z "$ZLIB_LIB" ]; then
            echo "libz.a not found in Homebrew zlib prefix"
            find "$(brew --prefix)" -type f -name 'libz.*' | head -n 20
            exit 1
          fi
          cp -f "$OPENSSL_SSL" "./td/tdlib/lib/"
          cp -f "$OPENSSL_CRYPTO" "./td/tdlib/lib/"
          cp -f "$ZLIB_LIB" "./td/tdlib/lib/"

      - name: Save cache TDLib
        if: steps.cache-tdlib-restore.outputs.cache-hit != 'true' && (contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config') || contains(matrix.feature, 'download-tdlib'))
        uses: actions/cache/save@v5
        with:
          path: td/
          key: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}

      - name: Extract TDLib x86_64
        if: runner.arch == 'x64' && (contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config') || contains(matrix.feature, 'download-tdlib'))
        run: |
          cp -r ./td/tdlib ./
          # cp ./tdlib/lib/libtdjson.*.dylib /usr/local/lib/

      - name: Extract TDLib ARM64
        if: runner.arch == 'ARM64' && (contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config') || contains(matrix.feature, 'download-tdlib'))
        run: |
          cp -r ./td/tdlib ./
          # sudo cp ./tdlib/lib/libtdjson.*.dylib /usr/local/lib/
       
      - name: Fix TDLib permissions (files + directories)
        if: contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config') || contains(matrix.feature, 'download-tdlib')
        run: |
          sudo chown -R "$(id -u):$(id -g)" tdlib
          chmod -R u+rwX tdlib

      # Install dylib into /usr/local/lib so build script (and dyld) can find it at runtime
      - name: Install TDLib dylib to /usr/local/lib (macOS)
        if: contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config') || contains(matrix.feature, 'download-tdlib')
        run: |
          sudo mkdir -p /usr/local/lib
          sudo cp -f tdlib/lib/libtdjson.*.dylib /usr/local/lib/
          ls -la tdlib/lib/libtdjson*.dylib
          ls -la /usr/local/lib/libtdjson*.dylib || true

      - name: Set PKG_CONFIG_PATH and DYLD_LIBRARY_PATH
        if: contains(matrix.feature, 'pkg-config')
        run: |
          echo "PKG_CONFIG_PATH=$(pwd)/tdlib/lib/pkgconfig" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=$(pwd)/tdlib/lib" >> $GITHUB_ENV

      - name: Set LOCAL_TDLIB_PATH and DYLD_LIBRARY_PATH
        if: contains(matrix.feature, 'local-tdlib')
        run: |
          echo "LOCAL_TDLIB_PATH=$(pwd)/tdlib" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=$(pwd)/tdlib/lib" >> $GITHUB_ENV

      # dyld looks in target/debug/deps first; put dylib there so build script finds it (macOS ignores DYLD_LIBRARY_PATH in some contexts). For download-tdlib we bootstrap with our TDLib build so the build script can run; it then downloads its own copy for the app.
      - name: Place TDLib dylib in target/debug/deps (macOS)
        if: contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config') || contains(matrix.feature, 'download-tdlib')
        run: |
          mkdir -p target/debug/deps
          cp -f tdlib/lib/libtdjson.*.dylib target/debug/deps/

      # - name: Cache cargo
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       ~/.cargo/bin/
      #       ~/.cargo/registry/index/
      #       ~/.cargo/registry/cache/
      #       ~/.cargo/git/db/
      #       target/
      #     key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      #     restore-keys: ${{ runner.os }}-cargo-
      
      - name: Cargo and rustc versions
        run: |
          cargo --version
          rustc --version

      - name: Run cargo build
        run: |
          if [ -d "tdlib/lib" ]; then export DYLD_LIBRARY_PATH="$(pwd)/tdlib/lib"; fi
          cargo build --no-default-features --verbose --features ${{ matrix.feature }}

      - name: Run cargo test
        run: |
          if [ -d "tdlib/lib" ]; then export DYLD_LIBRARY_PATH="$(pwd)/tdlib/lib"; fi
          cargo test --no-default-features --verbose --features ${{ matrix.feature }} -- --nocapture --test-threads=1
        # Timeout is 10 minutes to avoid the job being hanged for the default 6 hours timeout
        timeout-minutes: 10

      - name: Run cargo clippy
        run: |
          if [ -d "tdlib/lib" ]; then export DYLD_LIBRARY_PATH="$(pwd)/tdlib/lib"; fi
          cargo clippy --no-default-features --all-targets --features ${{ matrix.feature }} -- -D warnings

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      # - name: Upload artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ${{ runner.os }}-artifact
      #     path: ./
      #     overwrite: true
