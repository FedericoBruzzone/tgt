name: CI Windows

on:
  push:
    branches-ignore: ["dependabot/**"]
    tags-ignore: ["**"]
    paths:
      - "src/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "rustfmt.toml"
      - "config/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["**"]
    paths:
      - "src/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "rustfmt.toml"
      - "config/**"
      - ".github/workflows/**"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TDLIB_VERSION: 6d509061574d684117f74133056aa43df89022fc
  API_HASH: a3406de8d171bb422bb6ddf3bbd800e2
  API_ID: 94575

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, windows-11-arm]
        feature: [local-tdlib, pkg-config, download-tdlib, static-download, "local-tdlib,static"]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Chafa (for ratatui-image): MSYS2 UCRT64 has pkg-config + chafa only for x64; Windows ARM64 builds without chafa (target-specific dep)
      - name: Install Chafa (MSYS2 UCRT64)
        if: runner.arch == 'X64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-pkg-config mingw-w64-ucrt-x86_64-chafa
      # This is only needed if we build against the chafa-dyn feature
      # Chafa is an image library that is used to display images in the terminal without the need of an image protocol. It provides better image then rendering halblocks. 
      # TGT is now built without chafa by default, but the workflows are configured to be built with chafa-dyn as well for later use, with the prebuilt releases. 
      - name: Add MSYS2 UCRT64 to PATH for cargo (find pkg-config and chafa)
        if: runner.arch == 'X64'
        run: |
          $msys2 = "$env:RUNNER_TEMP\msys64\ucrt64"
          echo "$msys2\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "PKG_CONFIG_PATH=$msys2\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Restore cache TDLib
        if: contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config')
        id: cache-tdlib-restore
        uses: actions/cache/restore@v5
        with:
          path: td/
          key: ${{ runner.os }}-${{ runner.arch }}-TDLib-${{ env.TDLIB_VERSION }}

      - name: Build TDLib
        if: steps.cache-tdlib-restore.outputs.cache-hit != 'true' && (contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config'))
        env:
          FEATURE: ${{ matrix.feature }}
        run: |
          git clone https://github.com/tdlib/td.git
          cd td
          git checkout $TDLIB_VERSION
          git clone https://github.com/Microsoft/vcpkg.git
          cd vcpkg
          # Use latest vcpkg so MSYS2 package versions in vcpkg_acquire_msys.cmake are current (old versions 404 on mirrors).
          if [[ "$FEATURE" == "local-tdlib,static" ]]; then
            if [[ "$RUNNER_ARCH" == "X64" ]]; then
              ./bootstrap-vcpkg.bat
              ./vcpkg.exe install gperf:x64-windows-static openssl:x64-windows-static zlib:x64-windows-static
              CMAKE_ARCH="x64"
              VCPKG_TRIPLET="x64-windows-static"
            elif [[ "$RUNNER_ARCH" == "ARM64" ]]; then
              ./bootstrap-vcpkg.bat
              ./vcpkg.exe install gperf:arm64-windows-static openssl:arm64-windows-static zlib:arm64-windows-static
              CMAKE_ARCH="ARM64"
              VCPKG_TRIPLET="arm64-windows-static"
            else
              echo "Unsupported architecture: $RUNNER_ARCH"
              exit 1
            fi
          else
            if [[ "$RUNNER_ARCH" == "X64" ]]; then
              ./bootstrap-vcpkg.bat
              ./vcpkg.exe install gperf:x64-windows openssl:x64-windows zlib:x64-windows
              CMAKE_ARCH="x64"
              VCPKG_TRIPLET="x64-windows"
            elif [[ "$RUNNER_ARCH" == "ARM64" ]]; then
              ./bootstrap-vcpkg.bat
              ./vcpkg.exe install gperf:arm64-windows openssl:arm64-windows zlib:arm64-windows
              CMAKE_ARCH="ARM64"
              VCPKG_TRIPLET="arm64-windows"
            else
              echo "Unsupported architecture: $RUNNER_ARCH"
              exit 1
            fi
          fi
          cd ..
          rm -rf build
          mkdir build
          cd build
          cmake -A "$CMAKE_ARCH" -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_INSTALL_PREFIX:PATH=../tdlib -DCMAKE_TOOLCHAIN_FILE:FILEPATH=../vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET="$VCPKG_TRIPLET" ..
          cmake --build . --target install --config Release
        shell: bash

      - name: Save cache TDLib
        if: steps.cache-tdlib-restore.outputs.cache-hit != 'true' && (contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config'))
        uses: actions/cache/save@v5
        with:
          path: td/
          key: ${{ steps.cache-tdlib-restore.outputs.cache-primary-key }}

      - name: Extract TDLib
        if: contains(matrix.feature, 'local-tdlib') || contains(matrix.feature, 'pkg-config')
        run: cp -r ./td/tdlib ./
        shell: bash

      - name: Copy static TDLib archives for local-tdlib,static
        if: matrix.feature == 'local-tdlib,static'
        run: |
          if [[ "$RUNNER_ARCH" == "X64" ]]; then
            TRIPLET=x64-windows-static
          else
            TRIPLET=arm64-windows-static
          fi
          mkdir -p ./tdlib/lib
          # tdlib-rs expects libssl.lib + libcrypto.lib + zlib.lib on Windows when `static` is enabled.
          # vcpkg sometimes uses alternate names like libssl_static.lib or zlibstatic.lib.
          for lib in libssl.lib libcrypto.lib zlib.lib libssl_static.lib libcrypto_static.lib zlibstatic.lib ssl.lib crypto.lib; do
            path=$(find ./td/vcpkg/installed/$TRIPLET -maxdepth 20 -type f -name "$lib" 2>/dev/null | head -n 1 || true)
            if [ -n "$path" ]; then
              cp -f "$path" ./tdlib/lib/
            fi
          done
          # Some toolchains provide ssl.lib/crypto.lib; create the names tdlib-rs looks for.
          if [ -f ./tdlib/lib/ssl.lib ] && [ ! -f ./tdlib/lib/libssl.lib ]; then
            cp -f ./tdlib/lib/ssl.lib ./tdlib/lib/libssl.lib
          fi
          if [ -f ./tdlib/lib/crypto.lib ] && [ ! -f ./tdlib/lib/libcrypto.lib ]; then
            cp -f ./tdlib/lib/crypto.lib ./tdlib/lib/libcrypto.lib
          fi
          # zlib may be shipped as zlibstatic.lib; duplicate it to zlib.lib for tdlib-rs.
          if [ -f ./tdlib/lib/zlibstatic.lib ] && [ ! -f ./tdlib/lib/zlib.lib ]; then
            cp -f ./tdlib/lib/zlibstatic.lib ./tdlib/lib/zlib.lib
          fi
          echo "--- tdlib/lib contents ---"
          ls -la ./tdlib/lib || true
          echo "--- required files ---"
          for f in ./tdlib/lib/libssl.lib ./tdlib/lib/libcrypto.lib ./tdlib/lib/zlib.lib; do
            if [ ! -f "$f" ]; then
              echo "Missing required static lib: $f"
              echo "vcpkg search locations:"
              find ./td/vcpkg/installed/$TRIPLET -maxdepth 20 -type f \( -name 'libssl.lib' -o -name 'libcrypto.lib' -o -name 'zlib.lib' -o -name 'libssl_static.lib' -o -name 'libcrypto_static.lib' -o -name 'zlibstatic.lib' -o -name 'ssl.lib' -o -name 'crypto.lib' \) 2>/dev/null | head -n 200 || true
              exit 1
            fi
          done
        shell: bash

      - name: Install pkg-config
        if: contains(matrix.feature, 'pkg-config')
        run: |
          mkdir pkg-config
          cd pkg-config
          curl -kLSsO http://ftp.gnome.org/pub/gnome/binaries/win32/dependencies/pkg-config_0.26-1_win32.zip
          curl -kLSsO http://ftp.gnome.org/pub/gnome/binaries/win32/glib/2.28/glib_2.28.8-1_win32.zip
          curl -kLSsO http://ftp.gnome.org/pub/gnome/binaries/win32/dependencies/gettext-runtime_0.18.1.1-2_win32.zip
          unzip -q pkg-config_0.26-1_win32.zip -d pkg-config_0.26-1_win32
          unzip -q glib_2.28.8-1_win32.zip -d glib_2.28.8-1_win32
          unzip -q gettext-runtime_0.18.1.1-2_win32.zip -d gettext-runtime_0.18.1.1-2_win32
          cp ./gettext-runtime_0.18.1.1-2_win32/bin/intl.dll ./pkg-config_0.26-1_win32/bin/
          cp ./glib_2.28.8-1_win32/bin/* ./pkg-config_0.26-1_win32/bin/
        shell: bash

      - name: Set PKG_CONFIG_PATH and bin
        if: contains(matrix.feature, 'pkg-config')
        run: |
          $root = (Get-Item .).FullName
          echo "$root\pkg-config\pkg-config_0.26-1_win32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $tdlibPkg = Join-Path $root "tdlib\lib\pkgconfig"
          # Use ; on Windows so "D:" is not split; include MSYS2 chafa path first when on X64
          if ($env:RUNNER_ARCH -eq 'X64') {
            $msys2Pkg = Join-Path $env:RUNNER_TEMP "msys64\ucrt64\lib\pkgconfig"
            echo "PKG_CONFIG_PATH=$msys2Pkg;$tdlibPkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            echo "PKG_CONFIG_PATH=$tdlibPkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          echo (Join-Path $root "tdlib\bin") | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Set LOCAL_TDLIB_PATH
        if: contains(matrix.feature, 'local-tdlib')
        run: |
          $root = (Get-Item .).FullName
          $tdlib = Join-Path $root "tdlib"
          echo "LOCAL_TDLIB_PATH=$tdlib" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh
      # - name: Cache cargo
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       ~/.cargo/bin/
      #       ~/.cargo/registry/index/
      #       ~/.cargo/registry/cache/
      #       ~/.cargo/git/db/
      #       target/
      #     key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      #     restore-keys: ${{ runner.os }}-cargo-
      - name: Cargo and rustc versions
        run: |
          cargo --version
          rustc --version

      - name: Run cargo build
        run: cargo build --no-default-features --verbose --features ${{ matrix.feature }}

      - name: Run cargo test
        run: cargo test --no-default-features --verbose --features ${{ matrix.feature }} -- --nocapture --test-threads=1
        # Timeout is 10 minutes to avoid the job being hanged for the default 6 hours timeout
        timeout-minutes: 10

      - name: Run cargo clippy
        run: cargo clippy --no-default-features --all-targets --features ${{ matrix.feature }} -- -D warnings

      - name: Run cargo fmt
        run: cargo fmt --all -- --check
      # - name: Upload artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ${{ runner.os }}-artifact
      #     path: ./
      #     overwrite: true
